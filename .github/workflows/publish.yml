name: Publish Package

on:
  push:
    paths-ignore:
      - '.github/*'
      - '*.md'
      - "*.yml"
  pull_request:
    paths-ignore:
      - '.github/*'
      - '*.md'
      - "*.yml"
  workflow_dispatch:
    # allow manual trigger

jobs:
  build:
    permissions:
      contents: read
      packages: read
    uses: ExtractIntoVoid/workflows/.github/workflows/package.yml@main
    with:
      ProjName: EIV_Coroutines
    secrets:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}